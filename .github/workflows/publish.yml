# based on this astral / uv example: https://docs.astral.sh/uv/guides/integration/github/#publishing-to-pypi

name: publish to pypi

on:
  push:
    tags:
      - v*

jobs:
  build-core-wheels:
    name: core wheel ${{ matrix.platform.os }} ${{ matrix.platform.target }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: universal2-apple-darwin
          - os: windows-latest
            target: x64
    steps:
      - uses: actions/checkout@v5

      # abi3-py312 wheels: one wheel per platform, no per-Python matrix
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: core
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: core-wheel-${{ matrix.platform.os }}-${{ matrix.platform.target }}
          path: core/dist

  build-core-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: core
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: core-sdist
          path: core/dist

  publish-core:
    runs-on: ubuntu-latest
    needs: [build-core-wheels, build-core-sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/topozarr-core
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: actions/download-artifact@v4
        with:
          pattern: core-*
          merge-multiple: true
          path: dist

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Publish
        run: uv publish dist/*

  publish:
    runs-on: ubuntu-latest
    needs: [publish-core]
    environment:
      name: pypi
      url: https://pypi.org/p/topozarr
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build
        run: uv build --no-sources

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Smoke test (wheel)
        run: uv run --isolated --no-project --with dist/*.whl -- python -c "import topozarr; print(topozarr.__version__)"

      - name: Smoke test (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz -- python -c "import topozarr; print(topozarr.__version__)"

      - name: Publish
        run: uv publish dist/topozarr-*
