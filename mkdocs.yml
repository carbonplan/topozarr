site_name: topozarr
site_description: Lightweight multiscale Zarr pyramids
site_url: https://carbonplan.github.io/topozarr/
repo_url: https://github.com/carbonplan/topozarr
repo_name: carbonplan/topozarr

theme:
  name: material
  font: false
  logo: logo_512x512.png
  favicon: logo_512x512.png
  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            heading_level: 2
            docstring_style: google
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            line_length: 80
            docstring_section_style: list
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            merge_init_into_class: true

nav:
  - Home: index.md
  - Usage: usage.md
  - Design: design.md
  - API Reference: api.md
  - Contributing: contributing.md
